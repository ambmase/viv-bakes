<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact — Vivian Bakes</title>
  <meta name="description" content="Get in touch with Vivian for custom cakes, event inquiries, and collaborations." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,WONK@0,9..144,400;0,9..144,700;1,9..144,400&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <a href="#content" class="skip-link">Skip to content</a>

  <!-- Navigation -->
  <nav aria-label="Main navigation">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Vivian Bakes</a>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main id="content">

    <!-- Contact Header -->
    <header class="page-header fade-in">
      <p class="section-label">Get in Touch</p>
      <h1 class="section-title">Let's make something together.</h1>
      <p class="page-subtitle">
        Custom orders, event inquiries, or just want to say hello &mdash;
        I'd love to hear from you.
      </p>
    </header>

    <!-- Contact Form -->
    <section class="contact-page fade-in">
      <div class="contact-page-inner">
        <form id="contact-form" action="https://formspree.io/f/mjgpgryb" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="event-type">Event Type <span class="optional">(optional)</span></label>
              <select id="event-type" name="event_type">
                <option value="" disabled selected>Select an event type</option>
                <option value="wedding">Wedding</option>
                <option value="birthday">Birthday</option>
                <option value="anniversary">Anniversary</option>
                <option value="baby-shower">Baby Shower</option>
                <option value="corporate">Corporate</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="event-date">Event Date <span class="optional">(optional)</span></label>
              <input type="date" id="event-date" name="event_date" />
            </div>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required placeholder="Tell me about your vision..."></textarea>
          </div>
          <button type="submit" class="btn">Send Message</button>
        </form>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; <span id="year"></span> Vivian Bakes.</p>
  </footer>

  <script src="js/main.js" defer></script>

</body>
</html>
