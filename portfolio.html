<body>

  <a href="#content" class="skip-link">Skip to content</a>

  <!-- Navigation -->
  <nav aria-label="Main navigation">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Vivian Bakes</a>

        <span></span>
        <span></span>

      </button>
      <ul class="nav-links">
        <li><a href="portfolio.html" class="active">Portfolio</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main id="content">

        <a href="images/naked-cake.webp" class="glightbox gallery-item">

        <a href="images/ladybug-cupcakes.webp" class="glightbox gallery-item">

  <div class="sticky-contact" aria-label="Quick contact">
    <a href="contact.html" class="btn">Get in Touch</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js" defer></script>
  <script src="js/main.js" defer></script>
